name: build

on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
          - platform: windows
            os: ubuntu-latest
          - platform: macos
            os: macos-latest

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: deps (Linux / Windows cross)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          if [ "${{ matrix.platform }}" = "windows" ]; then
            sudo apt-get install -y gcc-mingw-w64
          else
            sudo apt-get install -y build-essential
          fi

      - name: deps (macOS)
        if: runner.os == 'macOS'
        run: |
          xcode-select --print-path || xcode-select --install

      - name: build (linux)
        if: matrix.platform == 'linux'
        run: make platform=unix

      - name: build (windows cross)
        if: matrix.platform == 'windows'
        run: make platform=win CC=x86_64-w64-mingw32-gcc

      - name: build (macos)
        if: matrix.platform == 'macos'
        shell: bash
        run: make platform=osx

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: core-${{ matrix.platform }}
          path: |
            *.so
            *.dll
            *.dylib
