name: build
on: [push]
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
          - platform: windows
            os: ubuntu-latest
          - platform: macos
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: deps (Linux/Windows)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          if [ "${{ matrix.platform }}" = "windows" ]; then
            sudo apt-get install -y gcc-mingw-w64
          else
            sudo apt-get install -y build-essential
          fi
      - name: build
        run: |
          if [ "${{ matrix.platform }}" = "windows" ]; then
            make platform=win CC=x86_64-w64-mingw32-gcc
          elif [ "${{ matrix.platform }}" = "macos" ]; then
            make platform=osx
          else
            make platform=unix
          fi
      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: core-${{ matrix.platform }}
          path: |
            *.so
            *.dll
            *.dylib